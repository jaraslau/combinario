services:
  llama:
    image: ghcr.io/ggml-org/llama.cpp:server
    container_name: llama_cpp
    env_file: .env
    command:
      - -m
      - /models/${LLM_MODEL}
      - --port
      - "8000"
      - --host
      - 0.0.0.0
      - --n-gpu-layers
      - ${N_GPU_LAYERS:-0}
      - --ctx-size
      - "2048"
      - --no-webui
    volumes:
      - ./models:/models:ro
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  db:
    image: postgres:16
    container_name: app_db
    env_file: .env
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  redis:
    image: redis:7-alpine
    container_name: app_redis
    env_file: .env
    command:
      - redis-server
      - --requirepass
      - ${REDIS_PASSWORD}
      - --maxmemory
      - ${REDIS_MAXMEMORY:-256mb}
      - --maxmemory-policy
      - allkeys-lru
      - --save
      - ""
      - --appendonly
      - "no"
    networks:
      - backend
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 5s

  migrate:
    build:
      context: .
      target: runtime
    container_name: app_migrate
    env_file:
      - .env
    volumes:
      - ./combinario/migrations:/app/migrations
    depends_on:
      db:
        condition: service_healthy
    networks:
      - backend
    command: alembic upgrade head
    restart: on-failure

  seed:
    build:
      context: .
      target: runtime
    container_name: db_seed
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
    environment:
      DB_URL: ${DB_URL}
    networks:
      - backend
    command:
      - python
      - seed.py
    restart: "no"

  app:
    build:
      context: .
      target: runtime
    container_name: app_combinario
    env_file: .env
    depends_on:
      db:
        condition: service_healthy
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      llama:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      LLAMA_BASE_URL: ${LLM_BASE_URL}
      OPEN_AI_API_KEY: ${OPEN_AI_API_KEY}
    ports:
      - "8080:8080"
    networks:
      - backend
      - frontend
    command:
      - uvicorn
      - app:app
      - --host
      - 0.0.0.0
      - --port
      - "8080"
      - --loop
      - uvloop
      - --http
      - httptools
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  worker:
    build:
      context: .
      target: runtime
    container_name: arq_worker
    env_file: .env
    depends_on:
      redis:
        condition: service_healthy
      db:
        condition: service_healthy
      llama:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      DB_URL: ${DB_URL}
      REDIS_URL: ${REDIS_URL}
      LLAMA_BASE_URL: ${LLM_BASE_URL}
      OPEN_AI_API_KEY: ${OPEN_AI_API_KEY}
    networks:
      - backend
    command:
      - arq
      - worker.WorkerSettings
    restart: unless-stopped

networks:
  backend:
    driver: bridge
    internal: true
  frontend:
    driver: bridge

volumes:
  pgdata: